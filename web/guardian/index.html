<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAKHSHA | Guardian Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #0A0A0A; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #map { height: 400px; border-radius: 12px; }
        .neon-border { border: 1px solid #00F0FF; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">GUARDIAN PORTAL</h1>
            <div id="status-indicator" class="flex items-center space-x-2">
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="text-sm font-bold">CONNECTED TO SHIELD</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- LIVE MAP -->
            <div class="lg:col-span-2 glass p-6 rounded-2xl neon-border">
                <h2 class="text-xl font-bold mb-4">LIVE TRACKING</h2>
                <div id="map"></div>
            </div>

            <!-- USER INFO & ALERTS -->
            <div class="space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-lg font-bold mb-4">PROTECTED USER</h2>
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center text-black font-bold">KP</div>
                        <div>
                            <p class="font-bold">Khushi Purwar</p>
                            <p id="user-status" class="text-xs text-green-400">STATUS: SECURE</p>
                        </div>
                    </div>
                </div>

                <div id="sos-alert-box" class="hidden glass p-6 rounded-2xl border-2 border-red-500 bg-red-900/20">
                    <h2 class="text-xl font-bold text-red-500 flex items-center">
                        <span class="mr-2">⚠️</span> SOS ALERT!
                    </h2>
                    <p class="mt-2 text-sm">Emergency trigger detected at <span id="sos-time"></span></p>
                    <button class="w-full mt-4 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl">DIAL POLICE</button>
                    <button id="get-directions" class="w-full mt-2 bg-white text-black font-bold py-3 rounded-xl">GET DIRECTIONS</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://rakhsha-backend.onrender.com");
        const map = L.map('map').setView([28.6139, 77.2090], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let userMarker = L.marker([28.6139, 77.2090]).addTo(map)
            .bindPopup('Last Known Location')
            .openPopup();

        socket.emit("join_room", "guardian_dashboard");

        socket.on("location_update", (data) => {
            const { latitude, longitude } = data;
            const newPos = [latitude, longitude];
            userMarker.setLatLng(newPos);
            map.panTo(newPos);
        });

        socket.on("sos_alert", (data) => {
            document.getElementById('sos-alert-box').classList.remove('hidden');
            document.getElementById('user-status').innerText = "STATUS: EMERGENCY";
            document.getElementById('user-status').className = "text-xs text-red-500 font-bold animate-pulse";
            document.getElementById('sos-time').innerText = new Date().toLocaleTimeString();
            
            document.getElementById('get-directions').onclick = () => {
                window.open(`https://www.google.com/maps?q=${data.location.latitude},${data.location.longitude}`);
            };
        });
    </script>
</body>
</html>
